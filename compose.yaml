services:
  mysql:
    image: 'mysql:latest'
    environment:
      - 'MYSQL_DATABASE=GroceryGurusDB'
      # - 'MYSQL_PASSWORD=secret'
      - 'MYSQL_ROOT_PASSWORD=wang'
      # - 'MYSQL_USER=myuser'
    ports:
      - '3306'
    volumes:
      - GroceryGurusDB:/var/lib/mysql

volumes:
  GroceryGurusDB: